---
layout: page
---
<header class='boxed header'>
  <h1 class='title'>
    <a href='{{ page.url }}'>
      {{ page.title }}
    </a>
  </h1>
</header>
{% assign posts = page.posts | sort: 'date' %}
<dl>
{% for post in posts reversed %}
<dt><a href='{{ post.url }}'>{{ post.title }}</a></dt>
<dd><time>{{ post.date | date: '%B %-d, %Y' }}</time></dd>
{% endfor %}
</dl>
{% include post/disqus.html %}
