{% capture details %}{{ site.data.domain.url }}{{ include.item.url }}&text={{ include.item.title }}{% endcapture %}

<aside class='share boxed'>
  <a href='http://twitter.com/intent/tweet?url={{ details }}'>Twitter</a>
  <div class="fb-like" data-href="https://developers.facebook.com/docs/plugins/" data-layout="button_count" data-action="like" data-show-faces="false" data-share="true"></div>
  <div><div class="g-plus" data-action="share" data-annotation="bubble"></div></div>
</aside>
